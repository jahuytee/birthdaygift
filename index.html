<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>for Alana</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="sky"></canvas>

<div id="intro-subtitle">for your birthday &mdash; here's our sky</div>

<div id="quote-display"></div>

<button id="camera-reset-btn" title="Reset view" aria-label="Reset view">
  <svg viewBox="0 0 24 24" width="20" height="20">
    <path fill="currentColor" d="M12 5V2L7 7l5 5V9c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
  </svg>
</button>

<div id="player-bar">
  <div id="player-info">
    <div id="player-constellation"></div>
    <div id="player-song-artist">
      <span id="player-song"></span> &middot; <span id="player-artist"></span>
    </div>
  </div>
  <button id="player-toggle" aria-label="Play or pause">
    <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>
  <div id="player-progress"><div id="player-progress-fill"></div></div>
</div>

<script src="script.js" defer></script>
</body>
</html>
